name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pyyaml 'fastapi[standard]' uvicorn
      - name: nosey --help
        run: |
          export NOSEY_CONFIG=config/nosey.example.yaml
          cp config/devices.example.yaml config/devices.yaml
          bin/nosey --help
      - name: nosey list (empty smoke)
        run: |
          export NOSEY_CONFIG=config/nosey.example.yaml
          bin/nosey list
      - name: import nosey serve handlers (syntax + import test)
        run: |
          python -c "import importlib.util, sys; spec=importlib.util.spec_from_file_location('nosey','bin/nosey'); m=importlib.util.module_from_spec(spec); sys.modules['nosey']=m; spec.loader.exec_module(m); assert callable(m.cmd_serve)"
